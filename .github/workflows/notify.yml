name: Notify

on:
  workflow_run:
    workflows: [Release]
    types: [completed]

permissions: {}

jobs:
  pushover:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Send Pushover notification
        env:
          PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_API_TOKEN }}
          PUSHOVER_USER: ${{ secrets.PUSHOVER_USER_KEY }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
        run: |
          curl -s -f \
            --form-string "token=${PUSHOVER_TOKEN}" \
            --form-string "user=${PUSHOVER_USER}" \
            --form-string "title=yt-dlp-enhanced-progress published" \
            --form-string "message=Release workflow succeeded. ${RUN_URL}" \
            --form-string "url=${RUN_URL}" \
            --form-string "url_title=View run" \
            https://api.pushover.net/1/messages.json
